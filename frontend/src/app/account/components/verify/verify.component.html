<form #verifyForm="ngForm"
      class="mt-3 max-w-md mx-auto block"
      (submit)="verify()">
    <vsf-centered-card title="Quase pronto!"
                       subTitle="Agora escolha uma senha para completar o processo">
            <input class="input-text"
                   placeholder="Senha"
                   type="password"
                   name="password"
                   aria-describedby="button-verify"
                   required
                   [(ngModel)]="password">

                <button class="btn-primary mt-3"
                        id="button-verify"
                        [disabled]="verifyForm.invalid"
                        type="submit">
                    Criar conta
                </button>
    </vsf-centered-card>
</form>
