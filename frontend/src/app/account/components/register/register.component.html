<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <form #registerForm="ngForm"
          (submit)="register()">
        <vsf-centered-card>
            <input class="input-text"
                   placeholder="Nome"
                   name="firstName"
                   required
                   [disabled]="registrationSent"
                   [(ngModel)]="firstName">
            <input class="input-text mt-1"
                   placeholder="Sobrenome"
                   name="lastName"
                   required
                   [disabled]="registrationSent"
                   [(ngModel)]="lastName">
            <input class="input-text mt-1"
                   placeholder="Endereço de email"
                   name="emailAddress"
                   required
                   type="email"
                   email
                   [disabled]="registrationSent"
                   [(ngModel)]="emailAddress">

            <button class="btn btn-primary btn-block mt-3"
                    [disabled]="registerForm.invalid || registrationSent"
                    type="submit">
Registrar
            </button>
            <div *ngIf="registrationSent" class="registration-sent">
Ótimo! Agora verifique seu email ({{ emailAddress }}) para completar o registro.
            </div>
        </vsf-centered-card>
    </form>
</div>
