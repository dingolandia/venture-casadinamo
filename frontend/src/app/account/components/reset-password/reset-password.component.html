<div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <form #resetForm="ngForm"
          class="mt-3"
          (submit)="confirmPasswordReset()">
        <vsf-centered-card title="Redefinir senha"
                           subTitle="Escolha uma nova senha">
            <div class="input-group mb-3" *ngIf="!error">
                <input class="input-text"
                       placeholder="Senha"
                       type="password"
                       name="password"
                       aria-describedby="button-verify"
                       required
                       [(ngModel)]="password">

                    <button class="btn-primary mt-3"
                            id="button-verify"
                            [disabled]="resetForm.invalid"
                            type="submit">
                        Redefinir senha
                    </button>
            </div>

            <div class="alert alert-danger mt-3" role="alert" *ngIf="error">
                {{ error }}
            </div>

        </vsf-centered-card>
    </form>
</div>
